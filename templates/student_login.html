<!DOCTYPE html>
<html>
<head>
    <title>Student Login - APS ERP</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; }
       .error { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Student Login</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Roll No / Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login as Student</button>
    </form>

    <p><a href="{{ url_for('login') }}">Admin/Teacher Login</a></p>
</body>
</html>
